<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>攝影作品案例｜畢業照・畢業典禮・學校活動｜小巴老師｜8-ways.com</title>
  <link rel="icon" type="image/png" href="../assets/images/logo/eightways-logo-square-gold.png" />
  <meta name="description" content="小巴老師攝影作品案例：幼兒園畢業照、畢業典禮、學校活動、家庭寫真，自然互動風格記錄孩子真實笑容。" />
  <link rel="canonical" href="https://grad.8-ways.com/pages/works.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="攝影作品案例｜小巴老師" />
  <meta property="og:url" content="https://grad.8-ways.com/pages/works.html" />
  <meta property="og:locale" content="zh_TW" />
  <meta name="robots" content="index, follow" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="site-header-placeholder"></div>

  <main class="subpage" id="top">
    <section class="section tight">
      <div class="container">
        <p class="kicker">攝影作品</p>
        <h1>攝影作品案例</h1>
        <p class="small">以下為畢業照、畢業典禮、學校活動等拍攝案例，點擊可進入單篇作品頁。</p>

        <div class="work-filters" id="workFilters" role="tablist" aria-label="依類別篩選">
          <button type="button" class="work-filter-btn active" data-category="" aria-selected="true">全部</button>
          <button type="button" class="work-filter-btn" data-category="graduation-photo" aria-selected="false">畢業照攝影</button>
          <button type="button" class="work-filter-btn" data-category="graduation-ceremony" aria-selected="false">畢業典禮攝影</button>
          <button type="button" class="work-filter-btn" data-category="school-event" aria-selected="false">學校活動攝影</button>
          <button type="button" class="work-filter-btn" data-category="family-photo" aria-selected="false">家庭寫真</button>
        </div>

        <div class="works-list grid-3" id="worksList" aria-live="polite"></div>

        <p class="work-list-empty hidden" id="worksEmpty">目前沒有符合條件的作品。</p>

        <div class="actions" style="margin-top:32px">
          <a class="btn ghost" href="graduation-photo.html">畢業照方案與價格</a>
          <a class="btn ghost" href="../index.html">回首頁</a>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer-placeholder"></div>

  <script src="../assets/js/include-components.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
  <script>
(function () {
  var base = '../';
  var listEl = document.getElementById('worksList');
  var emptyEl = document.getElementById('worksEmpty');
  var filterBtns = document.querySelectorAll('.work-filter-btn');
  var works = [];
  var currentCategory = '';

  function renderCard(w) {
    var coverSrc = (w.cover || '').replace(/^\//, '');
    var href = 'work/' + w.slug + '.html';
    var badges = [];
    if (w.categoryLabel) badges.push(w.categoryLabel);
    if (w.subcategoryLabel) badges.push(w.subcategoryLabel);
    var badgeHtml = badges.length ? '<p class="work-card-badges">' + badges.map(function (b) { return '<span class="work-badge">' + b + '</span>'; }).join(' ') + '</p>' : '';
    var excerpt = w.excerpt ? '<p class="work-card-excerpt small">' + w.excerpt.slice(0, 80) + (w.excerpt.length > 80 ? '…' : '') + '</p>' : '';
    return '<article class="work-card" data-category="' + (w.category || '') + '">' +
      '<a href="' + href + '" class="work-card-link">' +
        '<div class="work-card-cover"><img src="' + base + coverSrc + '" alt="" loading="lazy" /></div>' +
        '<div class="work-card-body">' +
          '<h2 class="work-card-title">' + (w.title || '') + '</h2>' +
          excerpt +
          '<p class="work-card-date small">' + (w.date || '') + '</p>' +
          badgeHtml +
        '</div>' +
      '</a></article>';
  }

  function render() {
    var list = currentCategory
      ? works.filter(function (w) { return w.category === currentCategory; })
      : works;
    listEl.innerHTML = list.map(renderCard).join('');
    emptyEl.classList.toggle('hidden', list.length > 0);
  }

  function initFilters() {
    filterBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        filterBtns.forEach(function (b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        currentCategory = btn.getAttribute('data-category') || '';
        render();
      });
    });
  }

  fetch(base + 'assets/data/works.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      works = data;
      render();
      initFilters();
    })
    .catch(function () {
      listEl.innerHTML = '<p class="small">無法載入作品列表，請稍後再試或執行 npm run build:works 建置。</p>';
    });
})();
  </script>
</body>
</html>
