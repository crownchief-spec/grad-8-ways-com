<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>幼兒園畢業照攝影 畢業典禮攝影｜客戶專屬頁面｜小巴老師｜8-ways.com</title>
  <link rel="icon" type="image/png" href="../assets/images/logo/eightways-logo-square-gold.png" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="site-header-placeholder"></div>
  <main class="subpage project-entry" id="top">
    <div class="container" style="max-width:480px">
      <header class="project-entry-header">
        <p class="kicker">客戶專屬</p>
        <h1>客戶專屬頁面</h1>
        <p class="project-entry-desc">請輸入學校名稱或專屬密碼，查看拍攝與校稿進度。</p>
      </header>
      <form class="project-query-form" id="projectQueryForm" novalidate>
        <label for="projectQuery" class="visually-hidden">學校名稱或專屬密碼</label>
        <input type="text" id="projectQuery" name="q" class="project-query-input" placeholder="請輸入學校名稱或密碼" autocomplete="off" required />
        <button type="submit" class="btn primary project-query-btn">驗證</button>
      </form>
      <p class="project-query-required hidden" id="projectQueryRequired" role="status">此頁面需要輸入密碼才能查看</p>
      <p class="project-query-error hidden" id="projectQueryError" role="alert">密碼錯誤，請重新輸入。</p>
      <div class="project-query-result hidden" id="projectQueryResult" aria-live="polite"></div>
      <div class="actions" style="margin-top:32px">
        <a class="btn ghost" href="../index.html">回首頁</a>
      </div>
    </div>
  </main>
  <div id="site-footer-placeholder"></div>
  <script src="../assets/js/include-components.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
  <script>
(function() {
  var form = document.getElementById('projectQueryForm');
  var input = document.getElementById('projectQuery');
  var errEl = document.getElementById('projectQueryError');
  var requiredEl = document.getElementById('projectQueryRequired');
  var resultEl = document.getElementById('projectQueryResult');
  var index = null;
  var projectRecords = [];
  var requiredSlug = null;
  var requiredMsg = '此頁面需要輸入密碼才能查看';

  var params = new URLSearchParams(location.search);
  if (params.has('required')) {
    requiredSlug = params.get('required');
    if (params.has('msg')) requiredMsg = params.get('msg');
    if (requiredEl) {
      requiredEl.textContent = requiredMsg;
      requiredEl.classList.remove('hidden');
    }
  }

  function showError() {
    if (errEl) {
      errEl.classList.remove('hidden');
      input.setAttribute('aria-invalid', 'true');
    }
  }
  function hideError() {
    if (errEl) errEl.classList.add('hidden');
    if (requiredEl) requiredEl.classList.add('hidden');
    if (resultEl) {
      resultEl.classList.add('hidden');
      resultEl.innerHTML = '';
    }
    input.removeAttribute('aria-invalid');
  }

  function addVerified(slug) {
    try {
      var raw = sessionStorage.getItem('verified_projects');
      var list = raw ? JSON.parse(raw) : [];
      if (list.indexOf(slug) < 0) list.push(slug);
      sessionStorage.setItem('verified_projects', JSON.stringify(list));
    } catch (e) {}
  }

  function navigateToSlug(slug) {
    if (!slug) return;
    addVerified(slug);
    location.href = slug + '/';
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function normalizeIndex(raw) {
    if (!raw || Array.isArray(raw)) return { lookup: {}, projects: [] };
    if (raw.lookup && raw.projects) return raw;

    var legacyLookup = raw;
    var projectMap = {};
    Object.keys(legacyLookup).forEach(function(key) {
      var slug = legacyLookup[key];
      if (!slug) return;
      if (!projectMap[slug]) projectMap[slug] = { slug: slug, school: '', password: '' };
      if (key && /[\u4e00-\u9fa5]/.test(key)) {
        projectMap[slug].school = key;
      } else {
        projectMap[slug].password = key;
      }
    });
    return {
      lookup: legacyLookup,
      projects: Object.keys(projectMap).map(function(slug) { return projectMap[slug]; })
    };
  }

  function getFuzzyMatches(q) {
    var keyword = q.toLowerCase();
    return projectRecords.filter(function(p) {
      var school = (p.school || '').toLowerCase();
      var password = (p.password || '').toLowerCase();
      return school.indexOf(keyword) >= 0 || password.indexOf(keyword) >= 0;
    });
  }

  function renderMatchList(matches) {
    if (!resultEl) return;
    resultEl.classList.remove('hidden');
    resultEl.innerHTML =
      '<p style="margin:12px 0 10px;">找到多筆相似結果，請選擇：</p>' +
      '<div class="project-resource-list">' +
      matches.map(function(m) {
        var label = m.school || m.slug;
        return '<button type="button" class="btn ghost project-select-btn" data-slug="' + escapeHtml(m.slug) + '">' + escapeHtml(label) + '</button>';
      }).join('') +
      '</div>';

    var buttons = resultEl.querySelectorAll('.project-select-btn');
    buttons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        navigateToSlug(btn.getAttribute('data-slug') || '');
      });
    });
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();
    var q = (input.value || '').trim();
    if (!q) {
      input.focus();
      return;
    }
    if (!index) {
      showError();
      return;
    }
    var slug = index[q] || index[q.toLowerCase()];
    if (requiredSlug) {
      if (slug === requiredSlug) {
        navigateToSlug(requiredSlug);
        return;
      }
      var requiredProject = projectRecords.find(function(p) { return p.slug === requiredSlug; });
      if (requiredProject) {
        var requiredSchool = (requiredProject.school || '').toLowerCase();
        if (requiredSchool && requiredSchool.indexOf(q.toLowerCase()) >= 0) {
          navigateToSlug(requiredSlug);
          return;
        }
      }
      showError();
      input.focus();
      return;
    }
    if (slug) {
      navigateToSlug(slug);
      return;
    }

    var fuzzyMatches = getFuzzyMatches(q);
    if (fuzzyMatches.length === 1) {
      navigateToSlug(fuzzyMatches[0].slug);
      return;
    }
    if (fuzzyMatches.length > 1) {
      renderMatchList(fuzzyMatches);
      return;
    }
    showError();
    input.focus();
  });

  fetch('projects-index.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var normalized = normalizeIndex(data);
      index = normalized.lookup || {};
      projectRecords = Array.isArray(normalized.projects) ? normalized.projects : [];
    })
    .catch(function() {
      index = {};
      projectRecords = [];
    });
})();
  </script>
</body>
</html>
